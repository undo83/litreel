<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books Admin — LitReel (internal)</title>
<style>
  :root{
    --bg:#0f1320; --panel:#171c2e; --panel-2:#1e2438; --ink:#e8ecf6; --muted:#8b94ad;
    --accent:#e0365b; --ok:#37c98b; --warn:#f0b352; --bad:#ef6a6a; --line:#2a3149;
    --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);padding:24px 16px 60px}
  .wrap{max-width:900px;margin:0 auto}
  h1{font-size:24px;margin-bottom:4px}
  .lead{color:var(--muted);font-size:14px;margin-bottom:20px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:600;font-size:14px;padding:11px 16px}
  .btn{background:var(--accent);color:#fff}
  .btn-ghost{background:var(--panel-2);color:var(--ink);border:1px solid var(--line)}
  .btn-bad{background:transparent;color:var(--bad);border:1px solid var(--line)}
  input,select,textarea{font-family:inherit;font-size:14px;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:18px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row > div{flex:1;min-width:120px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .tag{font-size:11px;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);padding:4px 10px;border-radius:999px}
  .banner{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;line-height:1.5}
  .banner.bad{background:rgba(239,106,106,.12);border:1px solid rgba(239,106,106,.4);color:var(--bad)}
  .hidden{display:none!important}
  .book-item{display:flex;gap:12px;align-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .book-item .emoji{font-size:24px}
  .book-item .meta{flex:1}
  .book-item .meta b{font-size:14px}
  .book-item .meta span{display:block;font-size:12px;color:var(--muted)}
  .book-item .acts{display:flex;gap:6px}
  .book-item .acts button{padding:6px 10px;font-size:12px}
  .mt{margin-top:12px}
  .small{font-size:12px;color:var(--muted)}
  .user-chip{display:flex;align-items:center;gap:8px;font-size:13px}
  .user-chip img{width:26px;height:26px;border-radius:50%}
  code{background:var(--panel-2);padding:1px 6px;border-radius:5px;color:var(--accent)}
  .inline{display:flex;gap:8px;align-items:flex-end}
  .inline button{white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>🎬 LitReel · Books Admin</h1>
      <p class="lead">Add / edit the books shown on the site (<code>books</code> collection).</p>
    </div>
    <div id="user-area"><span class="tag">LitReel · internal</span></div>
  </div>

  <div id="cfg-banner" class="banner bad hidden">
    ⚠️ Firebase is not configured. Fill <code>public/js/firebase-config.js</code> and reload.
  </div>

  <div id="login-screen" class="card hidden" style="text-align:center;padding:40px 18px">
    <p class="lead" style="margin-bottom:18px">Sign in with Google to manage books.</p>
    <button class="btn" id="btn-login">Sign in with Google</button>
  </div>

  <div id="denied-screen" class="hidden">
    <div class="banner bad">
      <b id="denied-email"></b> is not an admin. UID: <code id="denied-uid"></code>
    </div>
    <button class="btn-ghost" id="btn-logout-2">Switch account</button>
  </div>

  <div id="app" class="hidden">
    <div class="card">
      <h3 id="form-title" style="margin-bottom:14px">Add a book</h3>
      <input type="hidden" id="f-id">
      <div class="row">
        <div style="flex:3"><label>Title</label><input id="f-title" placeholder="The Housemaid"></div>
        <div><label>Emoji (fallback)</label><input id="f-emoji" placeholder="📚" value="📚"></div>
        <div><label>Order</label><input id="f-order" type="number" placeholder="1" value="1"></div>
      </div>
      <div class="row mt">
        <div style="flex:2"><label>ISBN-13 (for Bookshop + cover)</label>
          <div class="inline">
            <input id="f-isbn" placeholder="9781538742570">
            <button class="btn-ghost" type="button" id="btn-cover" style="font-size:12px;padding:9px 12px">Cover from ISBN</button>
          </div>
        </div>
        <div style="flex:1"><label>ASIN (Amazon, optional)</label><input id="f-asin" placeholder="B0..."></div>
      </div>
      <div class="mt"><label>Cover — image URL</label><input id="f-cover" placeholder="https://covers.openlibrary.org/b/isbn/…-L.jpg"></div>
      <div class="mt"><label>🔗 Short link (slug) — litreel.com/… (blank = auto from title)</label><input id="f-slug" placeholder="the-housemaid"></div>
      <div class="row mt">
        <div style="flex:2"><label>Author</label><input id="f-author" placeholder="Freida McFadden"></div>
        <div style="flex:2"><label>Genre</label><input id="f-genre" placeholder="Thriller"></div>
        <div><label>Rating (1-5)</label><input id="f-rating" type="number" min="1" max="5" value="5"></div>
      </div>
      <div class="mt"><label>Blurb (one selling line, no spoilers)</label><textarea id="f-blurb" rows="2" placeholder="A short line that sells the book."></textarea></div>
      <div class="mt"><label>🎬 TikTok video link (shows in „Latest trailers")</label><input id="f-tiktok" placeholder="https://www.tiktok.com/@litreel/video/…"></div>
      <div class="mt"><label>📝 Video script (internal — hook + body + CTA)</label><textarea id="f-script" rows="6" placeholder="[HOOK] …&#10;[BODY] …&#10;[CTA] …"></textarea></div>
      <div class="row mt" style="justify-content:flex-end">
        <button class="btn-ghost hidden" id="btn-cancel" type="button" style="flex:0">Cancel</button>
        <button class="btn" id="btn-save" type="button" style="flex:0">Save book</button>
      </div>
    </div>

    <h3 style="margin:18px 0 10px">Published books (<span id="count">0</span>)</h3>
    <div id="book-list"><p class="small">Loading…</p></div>
  </div>
</div>

<script type="module">
import { isConfigured, getAuth, authMod, getDb, firestore } from '../js/firebase-init.js';

const ADMIN_EMAILS = ['alex@rsjoomla.com'];
const $ = id => document.getElementById(id);
const show = (id, on=true) => $(id).classList.toggle('hidden', !on);

if (!isConfigured) { show('cfg-banner', true); throw new Error('Firebase not configured'); }

const auth = await getAuth();
const { signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } = await authMod();
const provider = new GoogleAuthProvider();
$('btn-login').onclick = () => signInWithPopup(auth, provider).catch(e => alert('Login error: ' + e.message));
const logout = () => signOut(auth);
$('btn-logout-2').onclick = logout;

let db, fs;

onAuthStateChanged(auth, async (user) => {
  show('login-screen', !user);
  show('app', false); show('denied-screen', false);
  $('user-area').innerHTML = '<span class="tag">LitReel · internal</span>';
  if (!user) return;

  if (!ADMIN_EMAILS.includes(user.email)) {
    $('denied-email').textContent = user.email;
    $('denied-uid').textContent = user.uid;
    show('denied-screen', true);
    return;
  }
  $('user-area').innerHTML = `<div class="user-chip">${user.photoURL ? `<img src="${user.photoURL}" alt="">` : ''}<span>${user.email}</span><button class="btn-ghost" id="btn-logout" style="padding:6px 10px;font-size:12px">Sign out</button></div>`;
  $('btn-logout').onclick = logout;
  show('app', true);
  db = await getDb();
  fs = await firestore();
  await renderList();
});

// Cover from ISBN (Open Library)
$('btn-cover').onclick = () => {
  const isbn = $('f-isbn').value.trim().replace(/[^0-9Xx]/g, '');
  if (!isbn) return alert('Enter an ISBN first.');
  $('f-cover').value = `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg`;
};

function resetForm() {
  ['f-id','f-title','f-isbn','f-asin','f-slug','f-cover','f-author','f-genre','f-blurb','f-tiktok','f-script'].forEach(id => $(id).value = '');
  $('f-emoji').value = '📚'; $('f-rating').value = '5'; $('f-order').value = '1';
  $('form-title').textContent = 'Add a book';
  show('btn-cancel', false);
}
$('btn-cancel').onclick = resetForm;

$('btn-save').onclick = async () => {
  const title = $('f-title').value.trim();
  if (!title) return alert('Add a title.');
  const data = {
    title, author: $('f-author').value.trim(), genre: $('f-genre').value.trim(),
    emoji: $('f-emoji').value.trim() || '📚', rating: Number($('f-rating').value) || 5,
    blurb: $('f-blurb').value.trim(), order: Number($('f-order').value) || 0,
    isbn: $('f-isbn').value.trim().replace(/[^0-9Xx]/g, ''), asin: $('f-asin').value.trim(),
    slug: $('f-slug').value.trim(),
    cover: $('f-cover').value.trim(), tiktokUrl: $('f-tiktok').value.trim(),
    videoScript: $('f-script').value.trim(), updatedAt: fs.serverTimestamp()
  };
  const { collection, doc, addDoc, setDoc } = fs;
  const id = $('f-id').value;
  try {
    if (id) await setDoc(doc(db, 'books', id), data, { merge: true });
    else await addDoc(collection(db, 'books'), { ...data, createdAt: fs.serverTimestamp() });
    resetForm(); await renderList();
  } catch (e) { alert('Save error: ' + e.message); }
};

async function renderList() {
  const { collection, getDocs, query, orderBy } = fs;
  const list = $('book-list');
  try {
    const snap = await getDocs(query(collection(db, 'books'), orderBy('order')));
    $('count').textContent = snap.size;
    if (snap.empty) { list.innerHTML = '<p class="small">No books yet. Add the first one!</p>'; return; }
    list.innerHTML = '';
    snap.forEach(d => {
      const b = d.data();
      const el = document.createElement('div');
      el.className = 'book-item';
      el.innerHTML = `
        ${b.cover ? `<img src="${b.cover}" style="width:34px;height:50px;object-fit:cover;border-radius:5px" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'emoji',textContent:'${b.emoji||'📚'}'}))">` : `<span class="emoji">${b.emoji || '📚'}</span>`}
        <div class="meta"><b>${b.title}</b><span>${b.author || ''} · ${b.genre || ''} · ⭐${b.rating || ''} · #${b.order ?? ''}${b.isbn ? ' · ISBN ✓' : ''}${b.tiktokUrl ? ' · ▶️' : ''}</span></div>
        <div class="acts"><button class="btn-ghost edit">Edit</button><button class="btn-bad del">Delete</button></div>`;
      el.querySelector('.edit').onclick = () => loadForEdit(d.id, b);
      el.querySelector('.del').onclick = () => removeBook(d.id, b.title);
      list.appendChild(el);
    });
  } catch (e) { list.innerHTML = `<p class="banner bad">Read error: ${e.message}</p>`; }
}

function loadForEdit(id, b) {
  $('f-id').value = id; $('f-title').value = b.title || ''; $('f-author').value = b.author || '';
  $('f-genre').value = b.genre || ''; $('f-emoji').value = b.emoji || '📚'; $('f-rating').value = b.rating || 5;
  $('f-blurb').value = b.blurb || ''; $('f-order').value = b.order ?? 0;
  $('f-isbn').value = b.isbn || ''; $('f-asin').value = b.asin || ''; $('f-slug').value = b.slug || ''; $('f-cover').value = b.cover || '';
  $('f-tiktok').value = b.tiktokUrl || ''; $('f-script').value = b.videoScript || '';
  $('form-title').textContent = 'Edit: ' + b.title;
  show('btn-cancel', true);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function removeBook(id, title) {
  if (!confirm(`Delete "${title}"?`)) return;
  const { doc, deleteDoc } = fs;
  try { await deleteDoc(doc(db, 'books', id)); await renderList(); }
  catch (e) { alert('Delete error: ' + e.message); }
}
</script>
</body>
</html>
